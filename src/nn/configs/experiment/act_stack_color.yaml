  #   use_ema_for_test: true
  model_checkpoint:
    save_top_k: 3
    mode: "min"
    monitor: "val/reconstruction_loss"
    filename: "epoch_{epoch:03d}-{val/reconstruction_loss:.5f}"
  # robomimic_runner:
