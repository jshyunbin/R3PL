  #   output_dir: ${paths.output_dir}
  #   dataset_path: "data/stack_color/image256.hdf5"
  #   shape_meta: ${model_tuning.shape_meta}
  #   every_n_epoch: 15
  #   n_train: 5
  #   n_train_vis: 1
  #   train_start_idx: 0
  #   n_test: 15
  #   n_test_vis: 4
  #   test_start_seed: 10000
  #   max_steps: 800
  #   n_obs_steps: ${model_tuning.n_obs_steps}
  #   n_action_steps: ${model_tuning.horizon}
  #   render_obs_key: "agentview_image"
  #   fps: 10
  #   past_action: false
  #   abs_action: true
  #   tqdm_interval_sec: 5.0
  #   n_envs: null
  #   temporal_agg: true

save_dir: null
append_wandb_name_to_save_dir: true
