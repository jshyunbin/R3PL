# @package _global_

defaults:
  - override /data: stack_color
  - override /model: act
  - override /callbacks: default
  - override /trainer: gpu

tags: ["act", "robomimic", "stack_color"]

timekeeping:
  max_epochs: 100
  batch_size: 32
  num_workers: 0

ckpt_path: './train/runs/2026-03-11_18-48-12/checkpoints/last.ckpt'

model_tuning:
  shape_meta: 
    image_resolution: 256
    action:
      shape:
      - 10
    obs:
      robot0_eef_pos:
        shape:
        - 3
      robot0_eef_quat:
        shape:
        - 4
      robot0_eye_in_hand_image:
        shape:
        - 3
        - 256
        - 256
        type: rgb
      robot0_gripper_qpos:
        shape:
        - 2
      agentview_image:
        shape:
        - 3
        - 256
        - 256
        type: rgb
      robot0_joint_pos:
        shape:
        - 7
  horizon: 64
  n_heads: 8
  n_obs_steps: 1
  num_enc_layers: 4
  num_dec_enc_layers: 4
  num_dec_dec_layers: 7
  dropout: 0.1
  kl_weight: 10.0
  hidden_dim: 512
  latent_dim: 32
  feedforward_dim: 3200
  learning_rate: 1e-5
  weight_decay: 1e-6
  warmup_steps: 500
  lr_min_ratio: 0.0
  forward_dtype: null
  pretrained_backbone: true


callbacks:
  # ema:
  #   _target_: src.nn.callbacks.ema.EMACallback
