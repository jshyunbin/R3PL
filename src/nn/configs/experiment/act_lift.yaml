# @package _global_

defaults:
  - override /data: lift
  - override /model: act
  - override /callbacks: default
  - override /trainer: gpu

tags: ["act", "robomimic", "lift"]

timekeeping:
  max_epochs: 300
  batch_size: 32
  num_workers: 0

model_tuning:
  shape_meta: 
    image_resolution: 84
    action:
      shape:
      - 10
    obs:
      robot0_eef_pos:
        shape:
        - 3
      robot0_eef_quat:
        shape:
        - 4
      robot0_eye_in_hand_image:
        shape:
        - 3
        - 84
        - 84
        type: rgb
      robot0_gripper_qpos:
        shape:
        - 2
      agentview_image:
        shape:
        - 3
        - 84
        - 84
        type: rgb
      robot0_joint_pos:
        shape:
        - 7
  horizon: 32
  n_obs_steps: 1
  n_heads: 8
  num_enc_layers: 4
  num_dec_enc_layers: 4
  num_dec_dec_layers: 7
  dropout: 0.1
  kl_weight: 10.0
  hidden_dim: 512
  latent_dim: 32
  feedforward_dim: 3200
  learning_rate: 1e-5
  weight_decay: 1e-6
  warmup_steps: 500
  lr_min_ratio: 0.0
  forward_dtype: null

trainer:
  check_val_every_n_epoch: 10

callbacks:
  # ema:
  #   _target_: src.nn.callbacks.ema.EMACallback
  #   decay: null
  #   inv_gamma: 1.0
  #   max_value: 0.9999
  #   min_value: 0.0
  #   power: 0.75
  #   use_ema_for_validation: true
  #   use_ema_for_test: true
  model_checkpoint:
    save_top_k: 5
    mode: "min"
    monitor: "val/reconstruction_loss"
    filename: "epoch_{epoch:03d}-{val/reconstruction_loss:.5f}"
  robomimic_runner:
    _target_: src.nn.callbacks.robomimic_runner.RobomimicRunner
    output_dir: ${paths.output_dir}
    dataset_path: "data/robomimic/lift/ph/image_abs.hdf5"
    shape_meta: ${model_tuning.shape_meta}
    every_n_epoch: 10
    n_train: 5
    n_train_vis: 1
    train_start_idx: 0
    n_test: 15
    n_test_vis: 4
    test_start_seed: 10000
    max_steps: 400
    n_obs_steps: 1
    n_action_steps: ${model_tuning.horizon}
    render_obs_key: "agentview_image"
    fps: 10
    crf: 22
    past_action: false
    abs_action: true
    tqdm_interval_sec: 5.0
    n_envs: null
    temporal_agg: true

save_dir: /tmp/ml-experiments
append_wandb_name_to_save_dir: true
