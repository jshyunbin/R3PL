# @package _global_

defaults:
  - override /data: pusht
  - override /model: diffusion_policy
  - override /callbacks: default
  - override /trainer: gpu

tags: ["diffusion_policy", "pusht"]

timekeeping:
  max_epochs: 100
  batch_size: 32
  num_workers: 0

model_tuning:
  shape_meta:
    action:
      shape:
      - 2
    obs:
      agent_pos:
        shape:
        - 2
        type: low_dim
      image:
        shape:
        - 3
        - 96
        - 96
        type: rgb
  beta_end: 0.02
  beta_schedule: squaredcos_cap_v2
  beta_start: 0.0001
  clip_sample: true
  num_train_timesteps: 100
  prediction_type: epsilon
  variance_type: fixed_small
  horizon: 16
  n_action_steps: 8
  n_obs_steps: 2
  num_inference_steps: 100
  obs_as_global_cond: true
  diffusion_step_embed_dim: 128
  down_dims:
    - 512
    - 1024
    - 2048
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: true
  learning_rate: 1e-4
  weight_decay: 1e-6
  warmup_steps: 500
  lr_min_ratio: 0.0
  rollout_during_val: true

trainer:
  check_val_every_n_epoch: 10

callbacks:
  ema:
    _target_: src.nn.callbacks.ema.EMACallback
    decay: null
    inv_gamma: 1.0
    max_value: 0.9999
    min_value: 0.0
    power: 0.75
    use_ema_for_validation: true
    use_ema_for_test: true
  model_checkpoint:
    save_top_k: 5
    mode: "max"
    monitor: "val/reward"
    filename: "epoch_{epoch:03d}-{val/reward:.1f}"


save_dir: /tmp/ml-experiments
append_wandb_name_to_save_dir: true