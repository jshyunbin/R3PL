# @package _global_

defaults:
  - override /data: pusht_multitask
  - override /model: act
  - override /callbacks: default
  - override /trainer: gpu

tags: ["act", "pusht", "multigoal"]

timekeeping:
  max_epochs: 200
  batch_size: 256
  num_workers: 8

model_tuning:
  shape_meta:
    action:
      shape:
      - 2
    obs:
      image:
        shape:
        - 3
        - 96
        - 96
        type: rgb
      agent_pos:
        shape:
        - 2
  horizon: 16
  n_heads: 8
  n_obs_steps: 1
  num_enc_layers: 4
  num_dec_enc_layers: 4
  num_dec_dec_layers: 7
  dropout: 0.1
  kl_weight: 10.0
  hidden_dim: 256
  latent_dim: 16
  feedforward_dim: 1600
  learning_rate: 1e-4
  weight_decay: 1e-6
  warmup_steps: 500
  lr_min_ratio: 0.0
  forward_dtype: null
  pretrained_backbone: false

trainer:
  check_val_every_n_epoch: 1

callbacks:
  model_checkpoint:
    save_top_k: 2
    mode: "max"
    monitor: "val/test_mean_score"
    filename: "epoch_{epoch:03d}-{val/test_mean_score:.3f}"
  pusht_multigoal_runner:
    _target_: src.nn.callbacks.pusht_multigoal_runner.PushTMultigoalRunner
    output_dir: ${paths.output_dir}
    every_n_epoch: 5
    n_train: 6
    n_train_vis: 2
    train_start_seed: 0
    n_test: 22
    n_test_vis: 6
    test_start_seed: 10000
    max_steps: 300
    n_obs_steps: ${model_tuning.n_obs_steps}
    n_action_steps: ${model_tuning.horizon}
    render_size: 96
    fps: 10
    crf: 22
    tqdm_interval_sec: 5.0
    n_envs: null

save_dir: /tmp/ml-experiments
append_wandb_name_to_save_dir: true
